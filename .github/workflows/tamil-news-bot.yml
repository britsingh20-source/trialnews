name: Tamil News Bot - Daily Run

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto fonts-noto-cjk ffmpeg libsndfile1 \
            libsm6 libxext6 libgl1

      - name: Install PyTorch CPU
        run: |
          pip install torch==2.0.1 torchvision==0.15.2 torchaudio==2.0.2 \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install core Python packages
        run: |
          pip install --upgrade pip
          pip install openai requests feedparser beautifulsoup4
          pip install gTTS pydub moviepy==1.0.3
          pip install Pillow numpy scipy
          pip install opencv-python-headless
          pip install librosa==0.10.1 numba==0.58.1

      - name: Install Wav2Lip dependencies
        run: |
          pip install batch-face resampy

      - name: Install SadTalker dependencies
        run: |
          pip install face_alignment==1.3.5 || pip install face_alignment
          pip install gfpgan==1.3.8 || pip install gfpgan
          pip install kornia==0.6.12 || pip install kornia
          pip install yacs pyyaml joblib scikit-image einops safetensors
          pip install huggingface_hub gdown

      - name: Patch basicsr
        run: |
          DEGRADATIONS=$(python -c "import basicsr, os; print(os.path.join(os.path.dirname(basicsr.__file__), 'data', 'degradations.py'))" 2>/dev/null || echo "")
          if [ -f "$DEGRADATIONS" ]; then
            sed -i 's/from torchvision.transforms.functional_tensor import rgb_to_grayscale/from torchvision.transforms.functional import rgb_to_grayscale/' "$DEGRADATIONS"
            echo "basicsr patch OK"
          else
            echo "basicsr not found - OK"
          fi

      - name: Clone SadTalker and download checkpoints
        run: |
          git clone https://github.com/OpenTalker/SadTalker.git /tmp/SadTalker
          mkdir -p /tmp/SadTalker/checkpoints/BFM_Fitting /tmp/SadTalker/gfpgan/weights
          echo "=== Main checkpoints ==="
          wget -q -O /tmp/SadTalker/checkpoints/SadTalker_V0.0.2_256.safetensors \
            "https://github.com/OpenTalker/SadTalker/releases/download/v0.0.2-rc/SadTalker_V0.0.2_256.safetensors"
          wget -q -O /tmp/SadTalker/checkpoints/mapping_00229-model.pth.tar \
            "https://github.com/OpenTalker/SadTalker/releases/download/v0.0.2-rc/mapping_00229-model.pth.tar"
          wget -q -O /tmp/SadTalker/checkpoints/mapping_00109-model.pth.tar \
            "https://github.com/OpenTalker/SadTalker/releases/download/v0.0.2-rc/mapping_00109-model.pth.tar"
          echo "=== BFM Fitting files ==="
          cd /tmp/SadTalker/checkpoints/BFM_Fitting
          wget -q -O 01_MorphableModel.mat \
            "https://github.com/JiauZhang/DragGAN/releases/download/v0.0.1/01_MorphableModel.mat" \
            || echo "WARN: 01_MorphableModel.mat failed"
          wget -q -O BFM09_model_info.mat \
            "https://github.com/ascust/BDMM/raw/master/BFM/BFM09_model_info.mat" \
            || echo "WARN: BFM09_model_info.mat failed"
          wget -q -O BFM_model_front.mat \
            "https://github.com/ascust/BDMM/raw/master/BFM/BFM_model_front.mat" \
            || echo "WARN: BFM_model_front.mat failed"
          BASE="https://raw.githubusercontent.com/YadiraF/face3d/master/examples/Data/BFM/Out"
          wget -q -O Exp_Pca.bin             "${BASE}/Exp_Pca.bin"             || echo "WARN: Exp_Pca.bin failed"
          wget -q -O facemodel_info.mat      "${BASE}/facemodel_info.mat"      || echo "WARN: facemodel_info.mat failed"
          wget -q -O select_vertex_id.mat    "${BASE}/select_vertex_id.mat"    || echo "WARN: select_vertex_id.mat failed"
          wget -q -O similarity_Lm3D_all.mat "${BASE}/similarity_Lm3D_all.mat" || echo "WARN: similarity_Lm3D_all.mat failed"
          wget -q -O std_exp.txt             "${BASE}/std_exp.txt"             || echo "WARN: std_exp.txt failed"
          echo "=== BFM count: $(ls /tmp/SadTalker/checkpoints/BFM_Fitting/ | wc -l) / 8 files ==="
          ls -lh /tmp/SadTalker/checkpoints/BFM_Fitting/
          echo "=== Patch SadTalker: np.float/int/bool → native Python types ==="
          find /tmp/SadTalker -name "*.py" -exec \
            sed -i \
              -e 's/np\.float\b/float/g' \
              -e 's/np\.int\b/int/g' \
              -e 's/np\.complex\b/complex/g' \
              -e 's/np\.bool\b/bool/g' \
              -e 's/np\.object\b/object/g' \
              -e 's/np\.str\b/str/g' \
            {} +
          echo "np.float patch applied"
          echo "=== Pre-download facexlib models ==="
          wget -q -O /tmp/SadTalker/gfpgan/weights/alignment_WFLW_4HG.pth \
            "https://github.com/xinntao/facexlib/releases/download/v0.1.0/alignment_WFLW_4HG.pth"
          wget -q -O /tmp/SadTalker/gfpgan/weights/detection_Resnet50_Final.pth \
            "https://github.com/xinntao/facexlib/releases/download/v0.1.0/detection_Resnet50_Final.pth"
          wget -q -O /tmp/SadTalker/gfpgan/weights/GFPGANv1.4.pth \
            "https://github.com/TencentARC/GFPGAN/releases/download/v1.3.4/GFPGANv1.4.pth"

      - name: Clone Wav2Lip and download checkpoint
        run: |
          git clone https://github.com/Rudrabha/Wav2Lip.git /tmp/Wav2Lip
          mkdir -p /tmp/Wav2Lip/checkpoints
          wget -q -O /tmp/Wav2Lip/checkpoints/wav2lip_gan.pth \
            "https://huggingface.co/numz/wav2lip_studio/resolve/main/Wav2lip/wav2lip_gan.pth"
          echo "=== Patch Wav2Lip audio.py for librosa >= 0.10 ==="
          sed -i \
            's/librosa\.filters\.mel(hp\.sample_rate, hp\.n_fft,/librosa.filters.mel(sr=hp.sample_rate, n_fft=hp.n_fft,/g' \
            /tmp/Wav2Lip/audio.py
          sed -i \
            's/librosa\.filters\.mel(hparams\.sample_rate, hparams\.n_fft,/librosa.filters.mel(sr=hparams.sample_rate, n_fft=hparams.n_fft,/g' \
            /tmp/Wav2Lip/audio.py
          echo "audio.py after patch:"
          grep 'filters.mel' /tmp/Wav2Lip/audio.py

      - name: Verify setup
        run: |
          python -c "import torch; print('torch', torch.__version__)"
          python -c "import face_alignment; print('face_alignment OK')" || echo "face_alignment WARN"
          ls /tmp/SadTalker/inference.py && echo "SadTalker OK" || echo "SadTalker MISSING"
          ls /tmp/SadTalker/checkpoints/BFM_Fitting/BFM_model_front.mat && echo "BFM OK" || echo "BFM MISSING ERROR"
          ls /tmp/Wav2Lip/checkpoints/wav2lip_gan.pth && echo "Wav2Lip OK" || echo "Wav2Lip MISSING"

      - name: Create output folders
        run: |
          mkdir -p tamil-news-bot-github_3/tamil-news-bot/output/audio
          mkdir -p tamil-news-bot-github_3/tamil-news-bot/output/videos
          mkdir -p tamil-news-bot-github_3/tamil-news-bot/logs

      - name: Run Tamil News Bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ID: ${{ secrets.IG_BUSINESS_ID }}
          SADTALKER_DIR: /tmp/SadTalker
          WAV2LIP_DIR: /tmp/Wav2Lip
        run: |
          python tamil-news-bot-github_3/tamil-news-bot/scripts/run_all.py

      - name: Show output files
        if: always()
        run: |
          echo "=== Videos ===" && ls -lh tamil-news-bot-github_3/tamil-news-bot/output/videos/ || echo "No videos"
          echo "=== Audio ===" && ls -lh tamil-news-bot-github_3/tamil-news-bot/output/audio/ || echo "No audio"

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tamil-news-videos-${{ github.run_number }}
          path: tamil-news-bot-github_3/tamil-news-bot/output/videos/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tamil-news-logs-${{ github.run_number }}
          path: tamil-news-bot-github_3/tamil-news-bot/logs/
          retention-days: 7
          if-no-files-found: ignore
