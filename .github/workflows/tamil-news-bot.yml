name: Tamil News Bot - Daily Run

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests gtts moviepy openai

      - name: Run Tamil News Bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ID: ${{ secrets.IG_BUSINESS_ID }}
        run: |
          cd tamil-news-bot-github_3/tamil-news-bot
          python scripts/run_all.py

      - name: Upload output videos as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tamil-news-videos-${{ github.run_number }}
          path: tamil-news-bot-github_3/tamil-news-bot/output/
          retention-days: 7
